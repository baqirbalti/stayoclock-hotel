kind = "web"
previewPath = "/"
title = "Hotel Booking System"
version = "1.0.0"
id = "artifacts/hotel-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25164

[services.development]
run = "pnpm --filter @workspace/hotel-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hotel-app", "run", "build" ]
publicDir = "artifacts/hotel-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25164"
BASE_PATH = "/"
